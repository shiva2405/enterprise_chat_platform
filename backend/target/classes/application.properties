server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:chatdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=enterprise-chat-platform-secret-key-2024-very-long-secret-for-security
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000

# Ollama Configuration
ollama.api.url=http://localhost:11434
ollama.model=llama3.2:1b

# Spring AI Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2:1b
spring.ai.ollama.embedding.model=llama3.2:1b

# Vector Store Configuration
vector.store.path=./data/vector-store.json

# RAG Configuration
rag.top-k=10
rag.similarity-threshold=0.3

# Document Processing Configuration
document.temp.path=./temp/documents

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
